<!DOCTYPE html>
<html>
<head>
    <title>Adaptive Quiz Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #1f1c2c, #0f0c29);
            font-family: 'Orbitron', sans-serif;
            color: white;
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 3rem;
            text-shadow: 0 0 20px cyan;
        }

        .btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(45deg, cyan, purple);
            color: white;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px cyan;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px cyan;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div>
        <h1>⚡ Adaptive Quiz Game ⚡</h1>
        <a href="/quiz"><button class="btn">START GAME</button></a>
    </div>
</body>
</html>
