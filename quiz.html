<!DOCTYPE html>
<html>
<head>
    <title>Adaptive Quiz</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .quiz-card {
            background: white;
            width: 500px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            animation: fadeIn 0.6s ease-in-out;
        }

        h2 {
            margin-top: 0;
            color: #333;
        }

        h3 {
            margin-bottom: 20px;
        }

        .option {
            display: block;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 2px solid #ddd;
            cursor: pointer;
            transition: 0.3s;
        }

        .option:hover {
            background-color: #f0f0f0;
            border-color: #2a5298;
        }

        input[type="radio"] {
            margin-right: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
            transform: scale(1.05);
        }

        .level {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .feedback {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }

        .correct {
            background-color: #d4edda;
            color: #155724;
        }

        .wrong {
            background-color: #f8d7da;
            color: #721c24;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(-20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="quiz-card">
    <h2>Question {{number}}</h2>
    <div class="level">Current Level: <b>{{level|capitalize}}</b></div>

    {% if feedback == "correct" %}
        <div class="feedback correct">
            Correct Answer! ✅
        </div>
    {% elif feedback == "wrong" %}
        <div class="feedback wrong">
            Wrong Answer ❌
        </div>
    {% endif %}

    <form method="POST">
        <h3>{{question.question}}</h3>

        {% for option in question.options %}
            <label class="option">
                <input type="radio" name="option" value="{{option}}" required>
                {{option}}
            </label>
        {% endfor %}

        <br>
        <button type="submit">Next Question</button>
    </form>
</div>

{% if feedback %}
<script>
    // Auto move to next question after 1.5 seconds
    setTimeout(function(){
        window.location.href = "/quiz";
    }, 1500);
</script>
{% endif %}

</body>
</html>
